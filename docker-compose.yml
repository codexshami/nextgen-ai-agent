version: '3.8'

services:
  ai-agent:
    image: codexshami/nextgen-ai-agent:latest
    ports:
      - "8080:8080"
    environment:
      - ENV_VAR_1=value1
      - ENV_VAR_2=value2
    volumes:
      - ./data:/app/data

  database:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: {}